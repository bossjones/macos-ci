#############################  Display  #############################

# Verbose program output
# Accepts log level: "error", "warn", "info", "debug", "trace"
verbose = "info"

# Don't show interactive progress bar while checking links.
no_progress = false

# Path to summary output file.
output = ".lychee-report.md"

#############################  Cache  ###############################

# Enable link caching. This can be helpful to avoid checking the same links on
# multiple runs.
cache = true

# Discard all cached requests older than this duration.
# NOTE: a stale 404 survives for this long. Pass --no-cache when re-verifying a
# link you just fixed.
max_cache_age = "7d"

#############################  Runtime  #############################

# Maximum number of allowed redirects.
max_redirects = 10

# Maximum number of allowed retries before a link is declared dead.
max_retries = 2

# Maximum number of concurrent link checks.
max_concurrency = 20

#############################  Requests  ############################

# User agent to send with each request.
user_agent = "lychee/0.22.0"

# Website timeout from connect to response finished.
timeout = 20

# Minimum wait time in seconds between retries of failed requests.
retry_wait_time = 2

# Comma-separated list of accepted status codes for valid links.
# 401/403/405 are included for endpoints that exist but refuse an anonymous GET.
accept = ["200", "401", "403", "405", "429"]

# Proceed for server connections considered insecure (invalid TLS).
insecure = false

# Only test links with the given schemes.
#
# `file` is REQUIRED here. The spec set is a web of relative links between
# specs/macos-ci/NN-*.md; lychee resolves those to file:// URLs. Dropping `file`
# (as boss-skills does) silently excludes every internal link, which also makes
# include_fragments below a no-op.
scheme = ["https", "http", "file"]

# When links are available using HTTPS, treat HTTP links as errors.
require_https = false

# Request method
method = "get"

# Fallback extensions to apply when a URL does not specify one.
fallback_extensions = ["md", "html"]

# Check #anchor fragments, not just whether the page exists.
#
# Load-bearing for this repo: specs/macos-ci.md deep-links into its sub-specs by
# heading anchor (e.g. 09-dotfiles-under-test.md#the-chezmoi-template-contract-g11).
# Without this, renaming a heading silently breaks every inbound link.
include_fragments = true

#############################  Exclusions  ##########################

# Skip missing input files (default is to error if they don't exist).
skip_missing = false

# Check links inside `<code>` and `<pre>` blocks as well as Markdown code
# blocks. Off: the specs quote composed example HCL/shell containing
# placeholder URLs (e.g. http://example.com in 02's Packer block).
include_verbatim = false

# Ignore case of paths when matching glob patterns.
glob_ignore_case = false

# Exclude URLs and mail addresses from checking. The values are treated as regular expressions
exclude = [
    # Localhost URLs (from code examples)
    '^https?://localhost',
    '^https?://127\.0\.0\.1',
    '^https?://0\.0\.0\.0',
    # NOTE: deliberately NOT excluding '^file://' — see `scheme` above. Internal
    # spec-to-spec links must be checked, fragments included.
    # Private/local development URLs
    '^https?://.*\.local',
    # Common example domains
    '^https?://example\.com',
    '^https?://example\.org',
]

# NOTE: no URL exclusions for docs.getutm.app. Every source URL in this repo is
# live (47/47 return 200). The one 404 path discussed in the specs
# (settings-apple/devices/) is written as inline code, not a link, because it was
# never a published page — see specs/macos-ci/11-sources.md, "Retraction".

# Exclude paths from getting checked. The values are treated as regular expressions
exclude_path = [
    "(^|/)node_modules/",
    "(^|/)\\.venv/",
    "(^|/)\\.git/",
    "(^|/)__pycache__/",
    # Orchestration scratch (agent boards/backlogs), not published documentation.
    "(^|/)\\.team/",
    # Exclude lychee report file (contains old broken links)
    "(^|/)\\.lychee-report\\.md$",
]

# Exclude all private IPs from checking.
exclude_all_private = true
exclude_private = true
exclude_link_local = true
exclude_loopback = true

# Check mail addresses
include_mail = false
