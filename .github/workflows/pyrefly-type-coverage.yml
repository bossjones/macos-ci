name: Pyrefly Type Coverage

on:
  pull_request:
    paths:
      - 'src/**/*.py'
      - 'tests/**/*.py'
      - 'tools/**/*.py'
      - '.claude/status_lines/*.py'
      - 'pyproject.toml'
      - '.github/workflows/pyrefly-type-coverage.yml'
      - '.github/workflows/pyrefly-type-coverage-comment.yml'

permissions:
  contents: read

jobs:
  pyrefly-type-coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      # macos-ci's pyrefly project-includes deliberately omits `.claude/status_lines` --
      # pyrefly's directory walker silently skips any path with a dot-directory component,
      # so that file is always passed as an explicit positional arg (see Justfile/Stop hook).
      - name: Run pyrefly coverage report on PR branch
        run: |
          uv run pyrefly coverage report src tests tools .claude/status_lines/status_line_v10.py \
            2>/dev/null > /tmp/pyrefly_report_pr.tmp && \
            mv /tmp/pyrefly_report_pr.tmp /tmp/pyrefly_report_pr.json || \
            echo '{}' > /tmp/pyrefly_report_pr.json

      - name: Save helper script from base branch
        run: |
          git show ${{ github.event.pull_request.base.sha }}:tools/pyrefly_type_coverage.py > /tmp/pyrefly_type_coverage.py 2>/dev/null \
            || cp tools/pyrefly_type_coverage.py /tmp/pyrefly_type_coverage.py

      - name: Checkout base branch
        run: git checkout ${{ github.base_ref }}

      - name: Run pyrefly coverage report on base branch
        run: |
          uv run pyrefly coverage report src tests tools .claude/status_lines/status_line_v10.py \
            2>/dev/null > /tmp/pyrefly_report_base.tmp && \
            mv /tmp/pyrefly_report_base.tmp /tmp/pyrefly_report_base.json || \
            echo '{}' > /tmp/pyrefly_report_base.json

      - name: Generate coverage comparison
        id: coverage
        run: |
          comment_body="$(uv run python /tmp/pyrefly_type_coverage.py \
            --base /tmp/pyrefly_report_base.json \
            < /tmp/pyrefly_report_pr.json)"

          {
            echo "### Pyrefly Type Coverage"
            echo ""
            echo "$comment_body"
          } | tee -a "$GITHUB_STEP_SUMMARY" > /tmp/type_coverage_comment.md

          # Save structured data for the fork-PR comment workflow
          cp /tmp/pyrefly_report_pr.json pr_report.json
          cp /tmp/pyrefly_report_base.json base_report.json

      - name: Save PR number
        run: |
          echo ${{ github.event.pull_request.number }} > pr_number.txt

      - name: Upload type coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyrefly_type_coverage
          path: |
            pr_report.json
            base_report.json
            pr_number.txt

      - name: Comment PR with type coverage
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const marker = '### Pyrefly Type Coverage';
            let body;
            try {
              body = fs.readFileSync('/tmp/type_coverage_comment.md', { encoding: 'utf8' });
            } catch {
              body = `${marker}\n\n_Coverage report unavailable._`;
            }
            const prNumber = context.payload.pull_request.number;

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find(c => c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }
